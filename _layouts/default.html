<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --paper: #ffffff;
      --text: #1a1f2c;
      --muted: #5a6477;
      --line: #dde3ea;
      --accent: #264e7d;
      --accent-soft: #eef3fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 0 1rem 2rem;
    }

    main {
      width: min(980px, 100%);
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 2rem 2rem;
      box-shadow: 0 8px 24px rgba(20, 38, 66, 0.08);
    }

    .site-header {
      margin: 0 -2rem 1.5rem;
      padding: 2rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfd 100%);
      border-radius: 12px 12px 0 0;
    }

    .site-title {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      line-height: 1.2;
    }

    .site-subtitle {
      margin: 0.55rem 0 0;
      color: var(--muted);
      max-width: 66ch;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 1rem;
    }

    .menu a {
      text-decoration: none;
      border: 1px solid #c3d2e6;
      border-radius: 999px;
      color: var(--accent);
      padding: 0.35rem 0.85rem;
      font-size: 0.93rem;
      background: #f7faff;
    }

    .menu a[aria-current="page"] {
      background: #dfeafa;
      border-color: #9bb8de;
      color: #1a3f69;
      font-weight: 600;
    }

    .content > :first-child {
      margin-top: 0;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.95rem 1rem;
      background: #fcfdff;
    }

    .card h3 {
      margin-top: 0;
      font-size: 1.02rem;
      color: #18263b;
    }

    h1, h2, h3 {
      line-height: 1.25;
      margin: 1.25em 0 0.55em;
      color: #121a27;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.6rem, 2.8vw, 2rem);
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.45rem;
    }

    h2 {
      font-size: 1.16rem;
      color: var(--accent);
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.22rem;
    }

    p, li { color: var(--text); }
    .muted { color: var(--muted); }

    ul, ol { padding-left: 1.25rem; }

    a { color: var(--accent); text-underline-offset: 0.1em; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 0.5rem;
      text-align: left;
    }

    footer {
      margin-top: 1.5rem;
      border-top: 1px solid var(--line);
      padding-top: 0.9rem;
      font-size: 0.92rem;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      main {
        padding: 0 1rem 1.25rem;
      }

      .site-header {
        margin: 0 -1rem 1rem;
        padding: 1.2rem 1rem 1rem;
      }
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      main {
        border: 0;
        border-radius: 0;
        width: 100%;
        box-shadow: none;
        padding: 0 0 1rem;
      }

      .site-header {
        margin: 0 0 1rem;
        padding: 0 0 1rem;
        border-radius: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="site-header">
      <p class="site-title">{{ site.title }}</p>
      <p class="site-subtitle">{{ site.description }}</p>
      <div class="menu">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} aria-current="page"{% endif %}>Start</a>
        <a href="{{ '/research/' | relative_url }}"{% if page.url contains '/research' %} aria-current="page"{% endif %}>Research</a>
        <a href="{{ '/teaching/' | relative_url }}"{% if page.url contains '/teaching' %} aria-current="page"{% endif %}>Teaching</a>
      </div>
    </header>
    <div class="content">
      {{ content }}
    </div>
    <footer>
      Contact: <a href="mailto:{{ site.email }}">{{ site.email }}</a>
    </footer>
  </main>
</body>
</html>
