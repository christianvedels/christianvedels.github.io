<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --paper: #ffffff;
      --text: #1d2532;
      --muted: #4b5668;
      --line: #dbe2ea;
      --accent: #0057a3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #eef2f9 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    main {
      width: min(900px, 100%);
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 12px 36px rgba(17, 38, 74, 0.08);
    }

    .topbar {
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--line);
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .menu a {
      text-decoration: none;
      border: 1px solid #c9d8eb;
      border-radius: 999px;
      color: var(--accent);
      padding: 0.3rem 0.75rem;
      font-size: 0.92rem;
      background: #f5faff;
    }

    .menu a[aria-current="page"] {
      background: #dfeefd;
      border-color: #9cc2ea;
      color: #0b3f73;
      font-weight: 600;
    }

    .panels {
      display: grid;
      gap: 1rem;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
      box-shadow: 0 6px 16px rgba(17, 38, 74, 0.04);
    }

    h1, h2, h3 {
      line-height: 1.25;
      margin: 1.4em 0 0.6em;
      color: #101722;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      border-bottom: 2px solid var(--line);
      padding-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.25rem;
      color: var(--accent);
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.3rem;
    }

    .panel > h2 {
      margin-top: 0;
    }

    p, li { color: var(--text); }

    ul, ol { padding-left: 1.25rem; }

    a { color: var(--accent); }

    code {
      background: #f2f5f9;
      border: 1px solid #e4ebf3;
      border-radius: 6px;
      padding: 0.12rem 0.35rem;
      font-size: 0.92em;
    }

    blockquote {
      margin: 0.9rem 0;
      padding: 0.1rem 1rem;
      border-left: 4px solid #c2d6ee;
      color: var(--muted);
      background: #f8fbff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 0.5rem;
      text-align: left;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      main {
        border: 0;
        border-radius: 0;
        width: 100%;
        box-shadow: none;
        padding: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav class="topbar">
      <div class="menu">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} aria-current="page"{% endif %}>Start</a>
        <a href="{{ '/research/' | relative_url }}"{% if page.url contains '/research' %} aria-current="page"{% endif %}>Research</a>
        <a href="{{ '/teaching/' | relative_url }}"{% if page.url contains '/teaching' %} aria-current="page"{% endif %}>Teaching</a>
      </div>
    </nav>
    <div class="panels">
      {{ content }}
    </div>
  </main>
</body>
</html>
